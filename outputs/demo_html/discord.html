<!doctype html>
<html lang="en">
<!--
  usage ─────────────────────────────────────────────────────────
  Self-contained Discord channel view. Designed to be screenshotted
  by a headless browser for use as a demo asset in the GuardianLens
  dashboard. Inspired by the claude.ai/design "Discord Bullying
  Mockup" — illustrated SVG avatars, per-user name colors, emoji
  reactions, server rail + channel list chrome.

  Drive the content via `location.hash` as URL-encoded JSON:

    {
      "server":   "Lincoln Middle · 7B",   // shown in sidebar header
      "channel":  "general",               // renders "#general"
      "topic":    "everything goes here — be cool <3",  // optional
      "date":     "Tuesday, October 14, 2025",          // optional
      "child":    "emma",                  // optional — user panel
      "status":   "🎮 Roblox",             // optional — under user name
      "typing":   "tyler.w",               // optional — typing line
      "messages": [
        {
          "sender": "emma",                // one of the known avatars, or any other
          "text":   "i got x = 12!",
          "time":   "Today at 3:42 PM",
          "reactions": [                   // optional
            {"emoji": "💀", "count": 4, "mine": true}
          ]
        }
      ]
    }

  Known avatar IDs (stylised illustrations, same cast as the design
  mockup): emma, jake, tyler, maya, josh, chloe. Any other sender
  falls back to an initial on a coloured circle.

  `@mentions` inline in message text are auto-wrapped as blurple
  pills — write them like `@emma` or `@tyler.w`.

  When the hash is empty a placeholder scene (the escalating
  bullying thread from the design file) renders so the template
  previews standalone.
  ────────────────────────────────────────────────────────────────
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Discord · demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #313338;
    --side: #2b2d31;
    --rail: #1e1f22;
    --user: #232428;
    --input: #383a40;
    --tx: #dbdee1;
    --tx-dim: #949ba4;
    --tx-faint: #80848e;
    --tx-head: #f2f3f5;
    --line: #3f4147;
    --blurple: #5865f2;
    --blurple-soft: rgba(88,101,242,0.15);
    --green: #23a559;
    --red: #f23f43;
  }

  html, body {
    background: #1a1a1e;
    color: var(--tx);
    font-family: "gg sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 16px;
    line-height: 1.375;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 72px 240px 1fr;
    background: var(--bg);
  }

  .emoji {
    font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
    font-style: normal;
  }

  /* ───────── server rail ─────────────────────────────── */
  .rail {
    background: var(--rail);
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .ic {
    width: 48px; height: 48px;
    border-radius: 24px;
    display: grid; place-items: center;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: border-radius 0.15s, background 0.15s;
    position: relative;
    font-size: 16px;
    overflow: hidden;
    flex: none;
  }
  .ic.home { background: var(--blurple); border-radius: 14px; }
  .ic.active { border-radius: 14px; }
  .ic.active::before {
    content: ""; position: absolute; left: -16px; top: 50%;
    transform: translateY(-50%);
    width: 4px; height: 40px;
    border-radius: 0 4px 4px 0; background: #fff;
  }
  .ic.s1 { background: linear-gradient(135deg, #5865f2, #7c3aed);
           font-size: 13px; letter-spacing: 0.02em; }
  .ic.s2 { background: linear-gradient(135deg, #eb459e, #f472b6); font-size: 20px; }
  .ic.s3 { background: #5fa84f; font-size: 13px; }
  .ic.s4 { background: linear-gradient(135deg, #f0b232, #fbbf24); font-size: 20px; color: #422; }
  .ic.s5 { background: #222; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08); font-size: 18px; }
  .ic.plus {
    background: #2b2d31; color: var(--green); font-size: 24px;
    line-height: 1; font-weight: 400;
  }
  .ic.compass {
    background: #2b2d31; color: var(--green); font-size: 22px;
  }
  .sep { width: 32px; height: 2px; border-radius: 1px; background: rgba(255,255,255,0.06); }

  /* ───────── channel sidebar ─────────────────────────── */
  .channels {
    background: var(--side);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 1px 0 0 rgba(0,0,0,0.2);
  }
  .channels-head {
    padding: 14px 16px;
    height: 48px;
    border-bottom: 1px solid #1f2023;
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .channels-head .name {
    font-size: 16px; font-weight: 600; color: var(--tx-head);
    letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .channels-head .chev {
    color: var(--tx-dim); font-size: 18px; line-height: 1; margin-left: 8px; flex: none;
  }
  .channels-scroll { flex: 1; overflow: hidden; padding: 8px 0; }
  .cat {
    padding: 16px 8px 4px 16px;
    font-size: 12px; font-weight: 600;
    color: var(--tx-faint);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 4px;
  }
  .cat .ch { font-size: 10px; }
  .cat .plus { margin-left: auto; font-size: 18px; color: var(--tx-faint); font-weight: 400; }

  .ch-item {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px 6px 10px;
    margin: 1px 8px;
    border-radius: 4px;
    color: var(--tx-dim);
    font-size: 16px;
    font-weight: 500;
    position: relative;
  }
  .ch-item.active { background: rgba(255,255,255,0.08); color: var(--tx-head); }
  .ch-item.unread::before {
    content: "";
    position: absolute;
    left: -8px; top: 50%;
    width: 4px; height: 8px;
    background: #fff;
    border-radius: 0 4px 4px 0;
    transform: translateY(-50%);
  }
  .ch-item .hash {
    color: var(--tx-faint);
    font-weight: 400;
    font-size: 22px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    flex: none;
    line-height: 1;
  }
  .ch-item.active .hash { color: var(--tx-head); }
  .ch-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ch-item .badge {
    height: 18px; border-radius: 10px;
    background: var(--red); color: #fff;
    font-size: 11px; font-weight: 700;
    display: grid; place-items: center;
    padding: 0 6px;
    min-width: 18px;
  }
  .ch-item .vc-count { font-size: 12px; color: var(--tx-faint); margin-left: auto; }

  /* user panel */
  .user-card {
    background: var(--user);
    padding: 8px;
    display: flex; align-items: center; gap: 8px;
    flex: none;
  }
  .user-card .av {
    width: 32px; height: 32px; border-radius: 50%;
    overflow: hidden; flex: none; position: relative;
  }
  .user-card .av::after {
    content: ""; position: absolute; bottom: -2px; right: -2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green);
    border: 2.5px solid var(--user);
  }
  .user-card .meta { min-width: 0; flex: 1; }
  .user-card .name {
    font-size: 14px; font-weight: 600; color: var(--tx-head);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .user-card .status {
    font-size: 12px; color: var(--tx-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .user-card .icons { display: flex; gap: 2px; color: var(--tx-dim); }
  .user-card .icons span {
    width: 32px; height: 32px;
    border-radius: 4px;
    display: grid; place-items: center;
    font-size: 16px;
  }

  /* ───────── chat column ────────────────────────────── */
  .chat {
    display: flex; flex-direction: column;
    background: var(--bg);
    min-width: 0;
    overflow: hidden;
  }
  .chat-head {
    height: 48px;
    padding: 0 16px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 1px 0 rgba(4,4,5,0.2), 0 1.5px 0 rgba(6,6,7,0.05);
    position: relative; z-index: 2;
    flex: none;
  }
  .chat-head .hash {
    color: var(--tx-faint); font-size: 24px; font-weight: 400;
    width: 24px; display: grid; place-items: center;
  }
  .chat-head .chname {
    font-size: 16px; font-weight: 600; color: var(--tx-head);
    letter-spacing: -0.01em;
  }
  .chat-head .sep { width: 1px; height: 24px; background: var(--line); margin: 0 8px; flex: none; }
  .chat-head .topic {
    font-size: 14px; color: var(--tx-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .chat-head .tools {
    margin-left: auto;
    display: flex; gap: 4px; align-items: center;
    color: var(--tx-dim);
    flex: none;
  }
  .chat-head .tool {
    width: 32px; height: 32px; border-radius: 4px;
    display: grid; place-items: center;
    font-size: 16px;
  }
  .chat-head .search-box {
    background: #1e1f22;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 13px;
    color: var(--tx-faint);
    display: flex; align-items: center; gap: 6px;
    width: 144px;
    height: 24px;
    margin: 0 4px;
  }

  /* messages */
  .msgs {
    flex: 1 1 auto;
    overflow: hidden;
    padding: 8px 0 12px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }

  .date-sep {
    display: flex; align-items: center; gap: 4px;
    padding: 16px 16px 8px;
    color: var(--tx-faint);
    font-size: 12px; font-weight: 600;
  }
  .date-sep::before, .date-sep::after {
    content: ""; flex: 1; height: 1px; background: var(--line);
  }
  .date-sep span { padding: 0 4px; }

  .msg {
    display: grid;
    grid-template-columns: 72px 1fr;
    padding: 2px 48px 2px 0;
    position: relative;
  }
  .msg:not(.grouped) { margin-top: 17px; }
  .msg.grouped        { margin-top: 0; }

  .msg .av {
    grid-column: 1;
    width: 40px; height: 40px;
    border-radius: 50%;
    margin-left: 16px;
    margin-top: 2px;
    display: grid; place-items: center;
    font-size: 15px; font-weight: 600; color: #fff;
    overflow: hidden;
    position: relative;
  }
  .msg.grouped .av { visibility: hidden; height: 0; margin: 0; }
  .msg.grouped .stamp-gutter {
    grid-column: 1;
    display: flex; justify-content: flex-end;
    padding-right: 8px; padding-top: 3px;
    color: var(--tx-faint);
  }
  .msg.grouped .stamp-gutter .ts {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    opacity: 0.4;
  }

  .msg-body { grid-column: 2; min-width: 0; }
  .msg-head {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 1px;
  }
  .msg-head .name {
    font-size: 16px; font-weight: 500;
    color: var(--tx-head);
    letter-spacing: -0.01em;
  }
  .msg-head .ts {
    font-size: 12px; color: var(--tx-faint);
    font-variant-numeric: tabular-nums;
  }
  .msg-content {
    font-size: 16px;
    color: var(--tx);
    line-height: 1.375;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .mention {
    background: var(--blurple-soft);
    color: #c9cdfb;
    padding: 0 2px;
    border-radius: 3px;
    font-weight: 500;
  }

  /* reactions */
  .reacts { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .react {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-radius: 8px;
    font-size: 14px;
    color: var(--tx);
  }
  .react.mine {
    background: rgba(88,101,242,0.15);
    border-color: var(--blurple);
    color: #c9cdfb;
  }
  .react .e { font-size: 17px; line-height: 1; }
  .react .n { font-weight: 600; font-size: 13px; text-align: center; }

  /* chat input */
  .chat-input { padding: 0 16px 24px; flex: none; }
  .input-bar {
    background: var(--input);
    border-radius: 8px;
    padding: 0 16px;
    display: flex; align-items: center; gap: 12px;
    color: var(--tx-faint);
    min-height: 44px;
  }
  .input-bar .plus-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--tx-dim);
    color: var(--input);
    display: grid; place-items: center;
    font-size: 20px;
    font-weight: 300;
    line-height: 1;
    flex: none;
  }
  .input-bar .text { flex: 1; font-size: 16px; padding: 11px 0; }
  .input-bar .tools-right {
    display: flex; gap: 12px; align-items: center;
    color: var(--tx-dim);
    font-size: 20px;
  }
  .input-bar .gif {
    font-size: 11px; font-weight: 700;
    background: var(--tx-dim); color: var(--input);
    padding: 3px 5px; border-radius: 4px;
  }

  .typing {
    font-size: 13px; color: var(--tx-dim);
    padding: 4px 4px 0;
    min-height: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .typing b { color: var(--tx-head); font-weight: 600; }
  .typing-dots { display: inline-flex; gap: 3px; vertical-align: -2px; }
  .typing-dots i {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--tx-dim);
    animation: bob 1.2s ease-in-out infinite;
  }
  .typing-dots i:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bob {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
    30% { transform: translateY(-3px); opacity: 1; }
  }

  /* avatar backgrounds (show through SVG corners if any) */
  .av-emma  { background: #ec4899; }
  .av-jake  { background: #3b82f6; }
  .av-tyler { background: #8b5cf6; }
  .av-maya  { background: #f59e0b; }
  .av-josh  { background: #06b6d4; }
  .av-chloe { background: #10b981; }
  .av svg { width: 100%; height: 100%; display: block; }

  /* per-user colour-coded display names */
  .c-emma  { color: #f472b6; }
  .c-jake  { color: #60a5fa; }
  .c-tyler { color: #a78bfa; }
  .c-maya  { color: #fbbf24; }
  .c-josh  { color: #22d3ee; }
  .c-chloe { color: #34d399; }
</style>
</head>
<body>

<script>
const KNOWN_AVATARS = new Set(['emma', 'jake', 'tyler', 'maya', 'josh', 'chloe']);

/* match "@word" (letters, digits, dot, underscore) */
const MENTION_RE = /@([A-Za-z0-9._-]+)/g;

const FALLBACK_PALETTE = [
  '#5865f2', '#eb459e', '#3ba55c', '#faa61a', '#1abc9c',
  '#e67e22', '#9c59b6', '#e74c3c',
];

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function avatarKey(name) {
  if (!name) return null;
  // Match on the leading alpha run so "tyler.w" → "tyler", "emma 🌷" → "emma"
  const m = String(name).toLowerCase().match(/^[a-z]+/);
  if (m && KNOWN_AVATARS.has(m[0])) return m[0];
  return null;
}

function colorClassFor(name) {
  const k = avatarKey(name);
  return k ? `c-${k}` : '';
}

function fallbackColor(name) {
  return FALLBACK_PALETTE[hashStr(name || '') % FALLBACK_PALETTE.length];
}

function escapeHtml(s) {
  return String(s || '')
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}

function renderText(text) {
  const safe = escapeHtml(text || '');
  return safe.replace(MENTION_RE, (_, u) => `<span class="mention">@${escapeHtml(u)}</span>`);
}

function avatarHtml(name) {
  const key = avatarKey(name);
  if (key) {
    return `<div class="av av-${key}"><svg viewBox="0 0 40 40"><use href="#ava-${key}"/></svg></div>`;
  }
  const initial = (String(name || '?').replace(/[^a-zA-Z0-9]/g, '').slice(0, 1) || '?').toUpperCase();
  const color = fallbackColor(name);
  return `<div class="av" style="background:${color};display:grid;place-items:center;color:#fff;font-weight:600">${escapeHtml(initial)}</div>`;
}

function avatarHtmlSmall(name) {
  const key = avatarKey(name);
  if (key) {
    return `<div class="av av-${key}" style="width:32px;height:32px"><svg viewBox="0 0 40 40"><use href="#ava-${key}"/></svg></div>`;
  }
  const initial = (String(name || '?').replace(/[^a-zA-Z0-9]/g, '').slice(0, 1) || '?').toUpperCase();
  const color = fallbackColor(name);
  return `<div class="av" style="width:32px;height:32px;background:${color};display:grid;place-items:center;color:#fff;font-weight:600">${escapeHtml(initial)}</div>`;
}

const DEFAULT_SCENE = {

    { sender: 'emma', text: 'wait im literally just trying to help 😭', time: 'Today at 3:46 PM' },
    { sender: 'emma', text: 'can u guys stop' },
    { sender: 'tyler.w', text: 'nobody asked u tho 🤷 nobody ever does', time: 'Today at 3:47 PM' },
    { sender: 'tyler.w', text: 'maybe thats why no one sits w u at lunch',
      reactions: [{ emoji: '💀', count: 5 }, { emoji: '🔥', count: 3 }] },
    { sender: 'josh.m', text: "FR she's so annoying in class too like pls just shut up 🙏🙏 nobody likes u",
      time: 'Today at 3:48 PM',
      reactions: [{ emoji: '💯', count: 4 }, { emoji: '🗣', count: 2 }] },
    { sender: 'maya', text: 'omg we should just make a new server without her 😭😭 @tyler.w @josh.m',
      time: 'Today at 3:49 PM',
      reactions: [{ emoji: '😭', count: 4 }, { emoji: '✅', count: 3 }] },
    { sender: 'emma', text: 'why are u guys being like this 😭 i didnt even do anything', time: 'Today at 3:50 PM' },
    { sender: 'tyler.w', text: 'existing is enough 💀 go cry to ur mom emma nobody cares', time: 'Today at 3:51 PM',
      reactions: [{ emoji: '💀', count: 7 }, { emoji: '😭', count: 3 }, { emoji: '🤡', count: 2 }] },
  ],
};

function readScene() {
  const raw = location.hash.slice(1);
  if (!raw) return DEFAULT_SCENE;
  try { return JSON.parse(decodeURIComponent(raw)); }
  catch (_) {
    try { return JSON.parse(raw); }
    catch (_) { return DEFAULT_SCENE; }
  }
}

function render() {
  const scene = readScene();
  const serverName = scene.server || 'Server';
  const channelName = scene.channel || 'general';
  const messages = Array.isArray(scene.messages) ? scene.messages : [];

  document.title = `#${channelName} · ${serverName}`;
  document.getElementById('serverName').textContent = serverName;
  document.getElementById('channelName').textContent = channelName;
  document.getElementById('channelTopic').textContent = scene.topic || 'everything goes here — be cool <3';
  document.getElementById('composerPlaceholder').textContent = `Message #${channelName}`;

  /* channel list — 6 rows, current channel is the active one with unread badge */
  const channels = ['general', 'memes', 'homework-help', 'gaming', 'vent', 'art-drops'];
  if (!channels.includes(channelName)) channels.unshift(channelName);
  const unreadFor = { [channelName]: 9, memes: 3 };
  const list = document.getElementById('channelList');
  list.innerHTML = '';
  for (const ch of channels) {
    const row = document.createElement('div');
    const isActive = (ch === channelName);
    const unread = unreadFor[ch];
    row.className = 'ch-item' + (isActive ? ' active' : '') + (unread ? ' unread' : '');
    row.innerHTML = `
      <span class="hash">#</span>
      <span class="label">${escapeHtml(ch)}</span>
      ${unread ? `<span class="badge">${unread}</span>` : ''}`;
    list.appendChild(row);
  }

  /* user panel */
  const selfName = scene.child || 'emma';
  const selfStatus = scene.status || '🎮 Roblox';
  document.getElementById('selfAv').outerHTML = avatarHtmlSmall(selfName).replace('class="av"', 'class="av" id="selfAv"').replace('class="av av-', 'class="av av-').replace(/id="selfAv"/, 'id="selfAv"');
  // (the above outerHTML line is a no-op trick to swap in a new avatar w/ id)
  const selfAv = document.getElementById('selfAv') || document.createElement('div');
  document.getElementById('selfName').textContent = selfName;
  document.getElementById('selfStatus').textContent = selfStatus;

  /* typing */
  const typing = document.getElementById('typing');
  if (scene.typing) {
    typing.style.display = 'flex';
    document.getElementById('typingWho').textContent = scene.typing;
  } else {
    typing.style.display = 'none';
  }

  /* messages */
  const out = document.getElementById('msgs');
  out.innerHTML = '';
  if (scene.date) {
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.innerHTML = `<span>${escapeHtml(scene.date)}</span>`;
    out.appendChild(sep);
  }

  let prevSender = null;
  for (const m of messages) {
    const grouped = (m.sender === prevSender);
    const el = document.createElement('div');
    el.className = 'msg' + (grouped ? ' grouped' : '');

    const colorCls = colorClassFor(m.sender);
    const nameStyle = colorCls ? '' : `style="color:${fallbackColor(m.sender)}"`;

    let reactionsHtml = '';
    if (Array.isArray(m.reactions) && m.reactions.length) {
      reactionsHtml = '<div class="reacts">' + m.reactions.map(r =>
        `<div class="react${r.mine ? ' mine' : ''}">
           <span class="e emoji">${escapeHtml(r.emoji)}</span>
           <span class="n">${Number(r.count) || 1}</span>
         </div>`
      ).join('') + '</div>';
    }

    if (grouped) {
      el.innerHTML = `
        <div class="stamp-gutter"><span class="ts">${escapeHtml(m.time || '')}</span></div>
        <div class="msg-body">
          <div class="msg-content">${renderText(m.text)}</div>
          ${reactionsHtml}
        </div>`;
    } else {
      el.innerHTML = `
        ${avatarHtml(m.sender)}
        <div class="msg-body">
          <div class="msg-head">
            <span class="name ${colorCls}" ${nameStyle}>${escapeHtml(m.sender)}</span>
            <span class="ts">${escapeHtml(m.time || '')}</span>
          </div>
          <div class="msg-content">${renderText(m.text)}</div>
          ${reactionsHtml}
        </div>`;
    }
    out.appendChild(el);
    prevSender = m.sender;
  }
}

/* swap in the self avatar separately (cleaner than the outerHTML trick above) */
function renderSelfAvatar() {
  const scene = readScene();
  const selfName = scene.child || 'emma';
  const host = document.getElementById('selfAv');
  if (!host) return;
  host.innerHTML = '';
  const key = avatarKey(selfName);
  if (key) {
    host.className = 'av av-' + key;
    host.innerHTML = `<svg viewBox="0 0 40 40"><use href="#ava-${key}"/></svg>`;
  } else {
    const initial = (selfName.replace(/[^a-zA-Z0-9]/g, '').slice(0, 1) || '?').toUpperCase();
    host.className = 'av';
    host.style.background = fallbackColor(selfName);
    host.style.color = '#fff';
    host.style.fontWeight = '600';
    host.style.display = 'grid';
    host.style.placeItems = 'center';
    host.textContent = initial;
  }
}

window.addEventListener('hashchange', () => { render(); renderSelfAvatar(); });
render();
renderSelfAvatar();
</script>
