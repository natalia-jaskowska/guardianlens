<!doctype html>
<html lang="en">
<!--
  usage ─────────────────────────────────────────────────────────
  Pure phone screenshot of a TikTok DM thread. Viewport is 390×844
  (iPhone 14 / 15 portrait) so a headless browser can screenshot
  it as if grabbed straight off the kid's phone — no desktop
  frame, no bezel chrome, no side captions.

  Drive the content via `location.hash`:

    {
      "other_user":    "xprogifter",         // @handle in header
      "other_display": "xProGifter",         // name line
      "verified":      false,
      "last_active":   "Active 3m ago",      // subtitle
      "status_time":   "9:41",               // status bar clock
      "child":         "emma",               // optional — any message
                                              // whose `from` equals this
                                              // (or literally "me") renders
                                              // as outgoing (right side)
      "messages": [
        {"from":"them","text":"...","time":"Today 3:42 PM",
         "reactions":[{"emoji":"❤️","count":1}]}
      ]
    }

  Empty hash → default grooming-style placeholder thread.
  ────────────────────────────────────────────────────────────────
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1">
<title>TikTok · DM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tt-bg: #000000;
    --tt-line: #1d1d21;
    --bubble-in: #1a1a1c;
    --bubble-out: #fe2c55;
    --tx: #f1f1f2;
    --tx-dim: #8b8c90;
    --tx-faint: #646566;
    --pink: #fe2c55;
    --verified: #20d5ec;
  }

  html, body {
    background: var(--tt-bg);
    color: var(--tx);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    width: 390px;
    height: 844px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .emoji {
    font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
    font-style: normal;
  }

  /* ── iOS status bar ── */
  .status {
    height: 44px;
    padding: 0 28px 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #fff;
    position: relative;
    flex: none;
    padding-top: 6px;
  }
  .status .time { font-family: "SF Pro Text","Inter",sans-serif; font-weight: 600; }
  .status .right-group { display: flex; align-items: center; gap: 6px; }
  .status svg { display: block; }
  .notch {
    position: absolute;
    top: 11px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 32px;
    background: #000;
    border-radius: 16px;
  }

  /* ── chat header ── */
  .chead {
    height: 58px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 0.5px solid var(--tt-line);
    flex: none;
  }
  .chead .back {
    color: #fff;
    font-size: 26px;
    width: 30px;
    line-height: 1;
    font-weight: 300;
  }
  .chead .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), #ff6d88);
    display: grid; place-items: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex: none;
    overflow: hidden;
  }
  .chead .who {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    line-height: 1.1;
  }
  .chead .who .name {
    font-size: 16px; font-weight: 700; color: #fff;
    display: flex; align-items: center; gap: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chead .who .verified {
    width: 15px; height: 15px;
    display: inline-block;
    color: var(--verified);
  }
  .chead .who .handle {
    font-size: 13px; color: var(--tx-dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .chead .active-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3ea560;
    display: inline-block;
  }
  .chead .actions {
    display: flex;
    gap: 6px;
    color: #fff;
  }
  .chead .actions svg {
    width: 24px; height: 24px;
  }

  /* ── messages ── */
  .msgs {
    flex: 1 1 auto;
    overflow: hidden;
    padding: 16px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    justify-content: flex-end;
  }
  .ts-sep {
    align-self: center;
    font-size: 12px;
    color: var(--tx-faint);
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 14px 0 8px;
  }

  .row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    max-width: 82%;
  }
  .row.me {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .row.them { align-self: flex-start; }
  .row.hidden-av .mini-av { visibility: hidden; }

  .mini-av {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), #ff6d88);
    display: grid; place-items: center;
    font-size: 11.5px; font-weight: 700; color: #fff;
    flex: none;
    overflow: hidden;
    margin-bottom: 2px;
  }

  .bubble-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; max-width: 100%; }
  .row.me .bubble-wrap { align-items: flex-end; }
  .sender-label {
    font-size: 11.5px;
    color: var(--tx-dim);
    font-weight: 600;
    padding: 0 12px 2px;
    letter-spacing: 0.02em;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 15.5px;
    line-height: 1.32;
    max-width: 100%;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
    position: relative;
  }
  .row.them .bubble {
    background: var(--bubble-in);
    color: #fff;
    border-bottom-left-radius: 6px;
  }
  .row.me .bubble {
    background: var(--bubble-out);
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .row.them + .row.them:not(.first) .bubble { border-top-left-radius: 6px; }
  .row.me + .row.me:not(.first) .bubble { border-top-right-radius: 6px; }

  .reacts {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #1a1a1c;
    border: 2px solid var(--tt-bg);
    border-radius: 999px;
    padding: 2px 7px 2px 5px;
    font-size: 12px;
    color: #fff;
    margin-top: -8px;
    align-self: flex-end;
    z-index: 1;
    position: relative;
    line-height: 1;
  }
  .row.them .reacts { align-self: flex-start; }
  .reacts .e { font-size: 14px; }
  .reacts .n { font-weight: 600; opacity: 0.85; font-size: 11.5px; }

  /* ── composer ── */
  .composer {
    padding: 10px 12px 8px;
    border-top: 0.5px solid var(--tt-line);
    display: flex;
    align-items: center;
    gap: 10px;
    flex: none;
  }
  .composer .camera {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--pink);
    display: grid; place-items: center;
    flex: none;
  }
  .composer .camera svg { width: 20px; height: 20px; color: #fff; }
  .composer .input {
    flex: 1;
    background: #18181b;
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--tx-faint);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .composer .input .trail {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 19px;
  }

  /* ── home indicator ── */
  .home-bar {
    height: 5px;
    width: 134px;
    background: #fff;
    border-radius: 3px;
    margin: 8px auto 7px;
    opacity: 0.95;
    flex: none;
  }
</style>
</head>
<body>

<!-- iOS status bar -->
<div class="status">
  <div class="notch"></div>
  <span class="time" id="statusTime">9:41</span>
  <span class="right-group">
    <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 11.5 6 9a3.5 3.5 0 0 1 5 0l-2.5 2.5ZM3.5 6.5a7.5 7.5 0 0 1 10 0l-1.5 1.5a5.5 5.5 0 0 0-7 0L3.5 6.5ZM0 3a12 12 0 0 1 17 0l-1.5 1.5a10 10 0 0 0-14 0L0 3Z"/></svg>
    <svg width="29" height="13" viewBox="0 0 29 13" fill="none">
      <rect x="0.5" y="0.5" width="24" height="12" rx="3" stroke="#fff" opacity=".4"/>
      <rect x="2" y="2" width="21" height="9" rx="1.5" fill="#fff"/>
      <rect x="25.5" y="4.5" width="2" height="4" rx=".8" fill="#fff" opacity=".4"/>
    </svg>
  </span>
</div>

<!-- chat header -->
<div class="chead">
  <div class="back">‹</div>
  <div class="avatar" id="otherAv">X</div>
  <div class="who">
    <div class="name">
      <span id="otherName">xProGifter</span>
      <span class="verified" id="verifiedBadge" style="display:none">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M7.06 1.58a2.5 2.5 0 0 1 1.88 0l.48.2a.5.5 0 0 0 .38 0l.48-.2a2.5 2.5 0 0 1 3.4 2.4l-.03.52a.5.5 0 0 0 .21.44l.43.3a2.5 2.5 0 0 1 .6 3.53l-.36.41a.5.5 0 0 0-.11.42l.07.52a2.5 2.5 0 0 1-2.24 2.82l-.52.05a.5.5 0 0 0-.35.22l-.31.43a2.5 2.5 0 0 1-3.56.5l-.4-.33a.5.5 0 0 0-.46 0l-.4.33a2.5 2.5 0 0 1-3.56-.5l-.31-.43a.5.5 0 0 0-.35-.22l-.52-.05A2.5 2.5 0 0 1 1.76 10l.07-.52a.5.5 0 0 0-.11-.42l-.36-.41a2.5 2.5 0 0 1 .6-3.53l.43-.3a.5.5 0 0 0 .21-.44l-.03-.52a2.5 2.5 0 0 1 3.4-2.4l.48.2a.5.5 0 0 0 .38 0ZM11.3 6.5l-1-1-2.55 2.55L6.7 6.9l-1 1 2.05 2.05L11.3 6.5Z"/></svg>
      </span>
    </div>
    <div class="handle">
      <span class="active-dot" id="activeDot"></span><span id="otherHandle">@xprogifter · Active 3m ago</span>
    </div>
  </div>
  <div class="actions">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="7" width="12" height="10" rx="2"/><path d="M15 10l6-3v10l-6-3z"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
  </div>
</div>

<!-- messages -->
<div class="msgs" id="msgs"></div>

<!-- composer -->
<div class="composer">
  <div class="camera">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 5h-3.2l-1.6-2.4A1 1 0 0 0 14.4 2H9.6a1 1 0 0 0-.8.6L7.2 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm-8 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"/></svg>
  </div>
  <div class="input">
    <span>Send a message...</span>
    <span class="trail"><span class="emoji">🎤</span><span class="emoji">😀</span></span>
  </div>
</div>

<div class="home-bar"></div>

<script>
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function escapeHtml(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}

const PALETTE = ['#fe2c55','#25f4ee','#f59e0b','#a855f7','#22c55e','#0ea5e9'];
function initialOf(name){
  const clean = String(name||'?').replace(/[^a-zA-Z0-9]/g,'');
  return (clean.slice(0,1) || '?').toUpperCase();
}
function colorFor(name){ return PALETTE[hashStr(name||'') % PALETTE.length]; }

const DEFAULT_SCENE = {
  other_user:    'xprogifter',
  other_display: 'xProGifter',
  verified:      false,
  last_active:   'Active 3m ago',
  status_time:   '9:41',
  messages: [
    { from: 'them', text: 'yooo emma saw your dance video, straight fire 🔥', time: 'Today 3:42 PM' },
    { from: 'them', text: 'how old r u btw?' },
    { from: 'me',   text: 'lol thanks!! im 13' , time: 'Today 3:43 PM', reactions: [{emoji:'❤️', count:1}] },
    { from: 'them', text: 'aw u write mature for 13 fr' },
    { from: 'them', text: 'imma send u some free stuff, what\'s ur paypal or cashapp?' },
    { from: 'them', text: 'can we move to snap btw? tiktok dms are so slow' },
    { from: 'me',   text: 'uhh idk', time: 'Today 3:45 PM' },
    { from: 'them', text: 'dw im cool, i do this w a few ppl already 💅 don\'t tell your parents tho lol' },
  ],
};

function readScene(){
  const raw = location.hash.slice(1);
  if (!raw) return DEFAULT_SCENE;
  try { return JSON.parse(decodeURIComponent(raw)); }
  catch(_){ try{ return JSON.parse(raw); }catch(_){ return DEFAULT_SCENE; } }
}

function render(){
  const s = readScene();
  document.getElementById('statusTime').textContent = s.status_time || '9:41';

  const child = (s.child || 'me').toLowerCase();
  const isMe = (msg) => {
    const from = String(msg.from || msg.sender || '').toLowerCase();
    return from === 'me' || from === 'self' || from === child;
  };

  // Work out how many DISTINCT non-child senders exist. If more than one,
  // treat this as a group DM and show sender names above each new run.
  const others = new Set();
  for (const m of s.messages || []) {
    if (!isMe(m)) {
      const from = String(m.from || m.sender || '').toLowerCase();
      if (from && from !== 'them') others.add(from);
    }
  }
  const isGroup = others.size >= 2;

  // Header — one-on-one DM vs group DM
  let display, handle;
  if (isGroup) {
    display = s.title || (Array.from(others).slice(0, 3).join(', '));
    handle  = `${others.size} people`;
  } else {
    display = s.other_display || s.other_user
              || (others.size ? Array.from(others)[0] : 'unknown');
    handle  = s.other_user || (others.size ? Array.from(others)[0] : '');
  }
  document.getElementById('otherName').textContent = display;
  document.getElementById('otherHandle').textContent = isGroup
    ? display
    : `@${handle} · ${s.last_active || 'Active now'}`;
  document.getElementById('verifiedBadge').style.display = s.verified ? 'inline-block' : 'none';

  const bigAv = document.getElementById('otherAv');
  bigAv.textContent = initialOf(display);
  bigAv.style.background = `linear-gradient(135deg, ${colorFor(display)} 0%, #ff6d88 100%)`;

  const out = document.getElementById('msgs');
  out.innerHTML = '';

  let prevFrom = null;
  let lastTime = null;
  for (const msg of s.messages || []) {
    const me = isMe(msg);
    const side = me ? 'me' : 'them';
    const from = String(msg.from || msg.sender || '').toLowerCase();

    // Timestamp divider when a new time label appears
    if (msg.time && msg.time !== lastTime) {
      const sep = document.createElement('div');
      sep.className = 'ts-sep';
      sep.textContent = msg.time;
      out.appendChild(sep);
      lastTime = msg.time;
      prevFrom = null;  // force avatar + label on the next bubble
    }

    const isNewRun = (from !== prevFrom);

    // Group-chat style: show sender name above the first bubble in each
    // non-child run. Uses their own hashed colour.
    if (isNewRun && !me && isGroup) {
      const label = document.createElement('div');
      label.className = 'sender-label';
      label.style.color = colorFor(from);
      label.textContent = from;
      out.appendChild(label);
    }

    const row = document.createElement('div');
    row.className = `row ${side}` + (isNewRun ? ' first' : ' hidden-av');

    // Mini avatar only on non-child runs
    const mini = document.createElement('div');
    mini.className = 'mini-av';
    // In a group chat each sender gets their own colour; in 1-1 we reuse the header avatar colour
    const avKey = isGroup ? from : display;
    mini.textContent = initialOf(avKey);
    mini.style.background = `linear-gradient(135deg, ${colorFor(avKey)} 0%, #ff6d88 100%)`;
    if (!me) row.appendChild(mini);

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = msg.text || '';
    wrap.appendChild(bub);

    if (Array.isArray(msg.reactions) && msg.reactions.length) {
      const r = document.createElement('div');
      r.className = 'reacts';
      r.innerHTML = msg.reactions.map(x =>
        `<span class="e emoji">${escapeHtml(x.emoji)}</span>` +
        (x.count > 1 ? `<span class="n">${Number(x.count)}</span>` : '')
      ).join('');
      wrap.appendChild(r);
    }

    row.appendChild(wrap);
    out.appendChild(row);
    prevFrom = from;
  }
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
