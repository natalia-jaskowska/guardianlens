services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # No host port — Ollama stays on the internal Docker network only.
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${MODEL:-gemma4:latest}"]
    restart: "no"

  guardlens:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      GUARDLENS_OLLAMA__HOST: http://ollama:11434
      GUARDLENS_OLLAMA__INFERENCE_MODEL: ${MODEL:-gemma4:latest}
      GUARDLENS_DASHBOARD__SERVER_PORT: "7860"
      GUARDLENS_DASHBOARD__SERVER_NAME: "0.0.0.0"
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped

volumes:
  ollama_data:
