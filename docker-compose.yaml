services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  guardlens:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      GUARDLENS_OLLAMA__HOST: http://ollama:11434
      GUARDLENS_OLLAMA__INFERENCE_MODEL: ${MODEL:-gemma4:latest}
      GUARDLENS_DASHBOARD__SERVER_PORT: "7860"
      GUARDLENS_DASHBOARD__SERVER_NAME: "0.0.0.0"
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped

volumes:
  ollama_data:
